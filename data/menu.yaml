        - id: spicy_mayo
          price: 0.75

  # ----- DRINKS -----
  - id: soda
    name: Soft Drink
    base_price: 2.00
    options:
      size:
        type: single_choice
        required: true
        choices: [small, medium, large]
        default: medium
        price_modifier:
          small: -0.50
          medium: 0
          large: 0.75
      flavor:
        type: single_choice
